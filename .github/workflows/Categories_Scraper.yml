name: QatarSale Categories Scraper

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  detect_pages:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build_matrix.outputs.matrix }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install "scrapling[all]"
          playwright install chromium
          playwright install-deps chromium
          python -m patchright install chromium

      - name: Detect pages and build matrix
        id: build_matrix
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python << 'EOF'
          import json
          import os
          from scrapling import StealthyFetcher
          from detect_utils import get_last_page

          CATEGORIES = {
              "cars_for_rent":                 "https://qatarsale.com/ar/products/cars_for_rent?basic_search:StatusFilter=0",
              "special_numbers-plate_numbers": "https://qatarsale.com/ar/products/special_numbers-plate_numbers?basic_search:StatusFilter=0",
              "bikes":                         "https://qatarsale.com/ar/products/bikes?basic_search:StatusFilter=0",
              "caravan":                       "https://qatarsale.com/ar/products/caravan?basic_search:StatusFilter=0",
              "gift_items":                    "https://qatarsale.com/ar/products/gift_items?basic_search:StatusFilter=0",
              "escalator":                     "https://qatarsale.com/ar/products/escalator?basic_search:StatusFilter=0",
              "air_beds_sleeping_bags":        "https://qatarsale.com/ar/products/air_beds_sleeping_bags?basic_search:StatusFilter=0",
              "cashier_machines":              "https://qatarsale.com/ar/products/cashier_machines?basic_search:StatusFilter=0",
              "elevators":                     "https://qatarsale.com/ar/products/elevators?basic_search:StatusFilter=0",
              "travel_accessories":            "https://qatarsale.com/ar/products/travel_accessories?basic_search:StatusFilter=0",
              "generators":                    "https://qatarsale.com/ar/products/generators?basic_search:StatusFilter=0",
              "building_materials":            "https://qatarsale.com/ar/products/building_materials?basic_search:StatusFilter=0",
              "shaving_hair_removal_products": "https://qatarsale.com/ar/products/shaving_hair_removal_products?basic_search:StatusFilter=0",
              "metal_detector":                "https://qatarsale.com/ar/products/metal_detector?basic_search:StatusFilter=0",
              "aquariums":                     "https://qatarsale.com/ar/products/aquariums?basic_search:StatusFilter=0",
              "business_industrial":           "https://qatarsale.com/ar/products/business_industrial?basic_search:StatusFilter=0",
              "pumps":                         "https://qatarsale.com/ar/products/pumps?basic_search:StatusFilter=0",
              "walkie_talkie":                 "https://qatarsale.com/ar/products/walkie_talkie?basic_search:StatusFilter=0",
              "glasses":                       "https://qatarsale.com/ar/products/glasses?basic_search:StatusFilter=0",
              "safe_boxes":                    "https://qatarsale.com/ar/products/safe_boxes?basic_search:StatusFilter=0",
              "tracking_systems":              "https://qatarsale.com/ar/products/tracking_systems?basic_search:StatusFilter=0",
              "pet_accessories":               "https://qatarsale.com/ar/products/pet_accessories?basic_search:StatusFilter=0",
              "stamps":                        "https://qatarsale.com/ar/products/stamps?basic_search:StatusFilter=0",
              "inflatable_games":              "https://qatarsale.com/ar/products/inflatable_games?basic_search:StatusFilter=0",
              "porta_cabin":                   "https://qatarsale.com/ar/products/porta_cabin?basic_search:StatusFilter=0",
              "fishing_equipment":             "https://qatarsale.com/ar/products/fishing_equipment?basic_search:StatusFilter=0"
          }

          JOBS_PER_CATEGORY = {
              "cars_for_rent":                 20,
              "special_numbers-plate_numbers": 20,
              "bikes":                         20,
              "caravan":                       20,
              "gift_items":                    20,
              "escalator":                     20,
              "air_beds_sleeping_bags":        20,
              "cashier_machines":              20,
              "elevators":                     20,
              "travel_accessories":            20,
              "generators":                    20,
              "building_materials":            20,
              "shaving_hair_removal_products": 20,
              "metal_detector":                20,
              "aquariums":                     20,
              "business_industrial":           20,
              "pumps":                         20,
              "walkie_talkie":                 20,
              "glasses":                       20,
              "safe_boxes":                    20,
              "tracking_systems":              20,
              "pet_accessories":               20,
              "stamps":                        20,
              "inflatable_games":              20,
              "porta_cabin":                   20,
              "fishing_equipment":             20
          }

          matrix = {"include": []}

          for category, url in CATEGORIES.items():
              print(f"Detecting pages for {category}...")
              try:
                  last_page = get_last_page(url)
                  if last_page == 0:
                      print(f"  {category}: no products, skipping")
                      continue
              except Exception as e:
                  print(f"Failed to detect pages for {category}: {e}")
                  last_page = 1

              print(f"  {category}: {last_page} pages")

              n_jobs = JOBS_PER_CATEGORY.get(category, 2)
              pages_per_job = max(1, last_page // n_jobs)

              for i in range(n_jobs):
                  start = i * pages_per_job + 1
                  end   = (i + 1) * pages_per_job if i < n_jobs - 1 else last_page
                  if start > last_page:
                      break
                  matrix["include"].append({
                      "category": category,
                      "start":    start,
                      "end":      end
                  })

          print(f"Matrix: {json.dumps(matrix, indent=2)}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
          EOF

  scrape:
    runs-on: ubuntu-latest
    needs: detect_pages
    strategy:
      matrix: ${{ fromJson(needs.detect_pages.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "scrapling[all]" openpyxl
          playwright install chromium
          playwright install-deps chromium
          python -m patchright install chromium

      - name: Run scraper
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python -u main.py "${{ matrix.category }}" ${{ matrix.start }} ${{ matrix.end }}

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        with:
          name: excel-${{ matrix.category }}-${{ matrix.start }}-${{ matrix.end }}
          path: |
            ${{ matrix.category }}_${{ matrix.start }}_${{ matrix.end }}.xlsx
            products_${{ matrix.category }}_${{ matrix.start }}_${{ matrix.end }}_failed.txt
          if-no-files-found: ignore
          
  merge:
    runs-on: ubuntu-latest
    needs: scrape

    strategy:
      matrix:
        category: [cars_for_rent, special_numbers-plate_numbers, bikes, caravan, gift_items, escalator, 
                   air_beds_sleeping_bags, cashier_machines, elevators, travel_accessories, generators,
                   building_materials, shaving_hair_removal_products, metal_detector, aquariums, 
                   business_industrial, pumps, walkie_talkie, glasses, safe_boxes, tracking_systems, 
                   pet_accessories, stamps, inflatable_games, porta_cabin, fishing_equipment]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl boto3

      - name: Download artifacts for ${{ matrix.category }}
        uses: actions/download-artifact@v4
        with:
          pattern: excel-${{ matrix.category }}-*
          merge-multiple: true
          path: excel_parts/

      - name: Merge and upload ${{ matrix.category }}
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python << 'EOF'
          import pandas as pd
          import glob, os, boto3
          from datetime import datetime
          from r2_uploader import upload_final_batch_assets

          category = "${{ matrix.category }}"
          files = glob.glob('excel_parts/*.xlsx')

          if not files:
              print(f"No Excel files found for {category}")
              exit(0)

          dfs = [pd.read_excel(f) for f in files]
          merged = pd.concat(dfs, ignore_index=True)
          merged = merged.drop_duplicates(subset=['product_url'], keep='first')

          output_file = f"{category}.xlsx"
          with pd.ExcelWriter(output_file, engine="openpyxl") as writer:
              merged.to_excel(writer, sheet_name=category[:31], index=False)

          total = len(merged)
          print(f"Category: {category} | Rows: {total} | Files merged: {len(files)}")

          result = upload_final_batch_assets(
              images_folder="",
              final_excel=output_file,
              folder_name="qatarsale",
              category=category
          )
          print(f"Upload result: {result}")

          dt = datetime.now()
          client = boto3.client('s3',
              endpoint_url=os.environ['CF_R2_ENDPOINT_URL'],
              aws_access_key_id=os.environ['CF_R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['CF_R2_SECRET_ACCESS_KEY'],
              region_name='auto'
          )
          bucket = os.environ['CF_R2_BUCKET_NAME']
          base_key = f"qatarsale/year={dt.year}/month={dt.strftime('%m')}/day={dt.strftime('%d')}/{category}/summary"

          # Summary
          summary_file = f"scrape_summary_{category}.txt"
          with open(summary_file, 'w', encoding='utf-8') as f:
              f.write(f"=== {category} ===\n")
              f.write(f"Run Date: {dt.strftime('%Y-%m-%d %H:%M:%S')} UTC\n")
              f.write(f"Status: DONE\n")
              f.write(f"Total Rows: {total}\n")
              f.write(f"Files Merged: {len(files)}\n\n")
              for col in merged.columns:
                  missing = merged[col].isna().sum() + (merged[col] == '').sum()
                  pct = (missing / total) * 100 if total > 0 else 0
                  f.write(f"{col}: {missing} empty ({pct:.2f}%)\n")

          client.upload_file(summary_file, bucket, f"{base_key}/scrape_summary.txt",
              ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})
          print(f"Summary uploaded: {base_key}/scrape_summary.txt")

          # Failed URLs
          failed = []
          for f in glob.glob('excel_parts/*_failed.txt'):
              with open(f, 'r', encoding='utf-8') as file:
                  for line in file:
                      line = line.strip()
                      if line.startswith('http'):
                          failed.append(line)

          failed_file = f"failed_urls_{category}.txt"
          with open(failed_file, 'w', encoding='utf-8') as f:
              f.write(f"=== {category} ===\n")
              f.write(f"Total Failed URLs: {len(failed)}\n\n")
              for u in failed:
                  f.write(u + '\n')

          client.upload_file(failed_file, bucket, f"{base_key}/failed_urls.txt",
              ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})
          print(f"Failed URLs uploaded: {base_key}/failed_urls.txt")
          EOF



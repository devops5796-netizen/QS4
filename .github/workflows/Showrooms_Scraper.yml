name: QatarSale Showrooms Scraper

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  detect_showrooms:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build_matrix.outputs.matrix }}
      total: ${{ steps.build_matrix.outputs.total }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install "scrapling[all]" pandas openpyxl
          playwright install chromium
          playwright install-deps chromium
          python -m patchright install chromium

      - name: Detect all showrooms and build matrix
        id: build_matrix
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python << 'EOF'
          import json
          import os
          from showroom_links_scraper import get_showroom_links

          showrooms = get_showroom_links()
          total = len(showrooms)

          matrix = {"include": []}
          
          if total == 0:
              print("❌ No showrooms found, skipping")
              matrix = {"include": [{"url": "none", "name": "none"}]}
          else:
              for i, url in enumerate(showrooms):
                  name = url.split("/ar/showroom/")[-1].split("/")[0] if "/ar/showroom/" in url else f"showroom_{i}"
                  matrix["include"].append({
                      "index": i,
                      "url": url,
                      "name": name
                  })

          print(f"📊 Total jobs: {len(matrix['include'])}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
              f.write(f"total={total}\n")
          EOF

  scrape_showrooms:
    runs-on: ubuntu-latest
    needs: detect_showrooms
    if: needs.detect_showrooms.outputs.total != '0'
    strategy:
      matrix: ${{ fromJson(needs.detect_showrooms.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-showrooms-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "scrapling[all]" openpyxl
          playwright install chromium
          playwright install-deps chromium
          python -m patchright install chromium

      - name: Run single showroom scraper
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          echo "🔄 Processing showroom ${{ matrix.index }}: ${{ matrix.name }}"
          echo "URL: ${{ matrix.url }}"
          python -u showroom_main.py "${{ matrix.url }}"

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        with:
          name: showroom-${{ matrix.index }}-${{ matrix.name }}
          path: |
            showroom_*.xlsx
            *_failed.txt
          if-no-files-found: ignore

  merge_all_showrooms:
    runs-on: ubuntu-latest
    needs: scrape_showrooms
    if: always()

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl boto3

      - name: Download all showroom artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: showroom-*
          merge-multiple: true
          path: showroom_parts/

      - name: Merge all showrooms into one Excel with sheets
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python << 'EOF'
          import pandas as pd
          import glob, os, boto3
          from datetime import datetime

          excel_files  = glob.glob('showroom_parts/showroom_*.xlsx')
          failed_files = glob.glob('showroom_parts/*_failed.txt')

          print(f"Found {len(excel_files)} Excel files")
          print(f"Found {len(failed_files)} failed files")

          # ✅ boto3 client أول حاجة
          dt     = datetime.now()
          bucket = os.environ['CF_R2_BUCKET_NAME']
          client = boto3.client('s3',
              endpoint_url=os.environ['CF_R2_ENDPOINT_URL'],
              aws_access_key_id=os.environ['CF_R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['CF_R2_SECRET_ACCESS_KEY'],
              region_name='auto'
          )
          base_key = f"qatarsale/year={dt.year}/month={dt.strftime('%m')}/day={dt.strftime('%d')}/showrooms_cars_for_sale"

          # ✅ collect failed URLs أول
          all_failed_urls = []
          for f in failed_files:
              try:
                  with open(f, 'r', encoding='utf-8') as file:
                      for line in file:
                          line = line.strip()
                          if line.startswith('http'):
                              all_failed_urls.append(line)
              except Exception as e:
                  print(f"Error reading {f}: {e}")

          # Merge Excel
          success_sheets  = []
          failed_showrooms = []

          with pd.ExcelWriter('all_showrooms.xlsx', engine='openpyxl') as writer:
              for f in excel_files:
                  try:
                      base_name  = os.path.basename(f)
                      sheet_name = base_name.replace('showroom_', '').replace('.xlsx', '')[:31]
                      df = pd.read_excel(f, sheet_name=0)
                      counter = 1
                      original_name = sheet_name
                      while sheet_name in writer.sheets:
                          sheet_name = f"{original_name}_{counter}"
                          counter += 1
                      df.to_excel(writer, sheet_name=sheet_name, index=False)
                      success_sheets.append({"name": sheet_name, "rows": len(df)})
                      print(f"  ✓ {sheet_name}: {len(df)} rows")
                  except Exception as e:
                      failed_showrooms.append(os.path.basename(f))
                      print(f"  ✗ {f}: {e}")

          # Upload Excel
          client.upload_file('all_showrooms.xlsx', bucket,
              f"{base_key}/excel/all_showrooms.xlsx",
              ExtraArgs={'ContentType': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'})
          print(f"Uploaded: {base_key}/excel/all_showrooms.xlsx")

          # Summary
          summary_file = "scrape_summary.txt"
          with open(summary_file, 'w', encoding='utf-8') as f:
              f.write(f"=== showrooms_cars_for_sale ===\n")
              f.write(f"Run Date: {dt.strftime('%Y-%m-%d %H:%M:%S')} UTC\n")
              f.write(f"Status: DONE\n\n")
              f.write(f"Total Showrooms Scraped: {len(success_sheets)}\n")
              f.write(f"Total Failed Showrooms: {len(failed_showrooms)}\n")
              f.write(f"Total Failed URLs: {len(all_failed_urls)}\n\n")
              f.write("--- Showrooms ---\n")
              for s in success_sheets:
                  f.write(f"{s['name']}: {s['rows']} products\n")
              if failed_showrooms:
                  f.write("\n--- Failed Showrooms ---\n")
                  for s in failed_showrooms:
                      f.write(f"{s}\n")

          client.upload_file(summary_file, bucket,
              f"{base_key}/summary/scrape_summary.txt",
              ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})
          print(f"Uploaded: {base_key}/summary/scrape_summary.txt")

          # Failed URLs
          failed_file = "failed_urls.txt"
          with open(failed_file, 'w', encoding='utf-8') as f:
              f.write(f"Total Failed URLs: {len(all_failed_urls)}\n\n")
              for u in all_failed_urls:
                  f.write(u + '\n')

          client.upload_file(failed_file, bucket,
              f"{base_key}/summary/failed_urls.txt",
              ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})
          print(f"Uploaded: {base_key}/summary/failed_urls.txt")

          print("Done!")
          EOF

name: Showrooms Single Category

on:
  workflow_call:
    inputs:
      category:
        required: true
        type: string  # cars_for_sale | cars_for_rent

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: detect all showroom URLs and build the matrix
  # ─────────────────────────────────────────────────────────────
  detect_showrooms:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build_matrix.outputs.matrix }}
      total:  ${{ steps.build_matrix.outputs.total }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install "scrapling[all]" pandas openpyxl
          playwright install chromium
          playwright install-deps chromium
          python -m patchright install chromium

      - name: Detect showrooms and build matrix
        id: build_matrix
        env:
          PYTHONUNBUFFERED: "1"
          CATEGORY: ${{ inputs.category }}
        run: |
          python << 'EOF'
          import json, os
          from showroom_links_scraper import get_showroom_links

          category  = os.environ["CATEGORY"]
          showrooms = get_showroom_links(category)
          total     = len(showrooms)

          matrix = {"include": []}

          if total == 0:
              print("❌ No showrooms found, skipping")
              matrix = {"include": [{"index": 0, "url": "none", "name": "none"}]}
          else:
              for i, url in enumerate(showrooms):
                  name = (
                      url.split("/ar/showroom/")[-1].split("/")[0]
                      if "/ar/showroom/" in url
                      else f"showroom_{i}"
                  )
                  matrix["include"].append({"index": i, "url": url, "name": name})

          print(f"📊 [{category}] Total jobs: {len(matrix['include'])}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
              f.write(f"total={total}\n")
          EOF

  # ─────────────────────────────────────────────────────────────
  # JOB 2: scrape each showroom in parallel (matrix)
  # ─────────────────────────────────────────────────────────────
  scrape_showrooms:
    runs-on: ubuntu-latest
    needs: detect_showrooms
    if: needs.detect_showrooms.outputs.total != '0'
    strategy:
      matrix: ${{ fromJson(needs.detect_showrooms.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-showrooms-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "scrapling[all]" openpyxl
          playwright install chromium
          playwright install-deps chromium
          python -m patchright install chromium

      - name: Run showroom scraper
        env:
          CF_R2_ACCESS_KEY_ID:     ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL:      ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME:       ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          echo "🔄 [${{ inputs.category }}] Showroom ${{ matrix.index }}: ${{ matrix.name }}"
          echo "URL: ${{ matrix.url }}"
          python -u showroom_main.py "${{ matrix.url }}" "${{ inputs.category }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: showroom-${{ inputs.category }}-${{ matrix.index }}-${{ matrix.name }}
          path: |
            showroom_*.xlsx
            *_failed.txt
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────
  # JOB 3: merge all showroom Excels + upload to R2
  # ─────────────────────────────────────────────────────────────
  merge_showrooms:
    runs-on: ubuntu-latest
    needs: scrape_showrooms
    if: always()

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl boto3 python-dotenv

      - name: Download all showroom artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: showroom-${{ inputs.category }}-*
          merge-multiple: true
          path: showroom_parts/

      - name: Merge and upload to R2
        env:
          CF_R2_ACCESS_KEY_ID:     ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL:      ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME:       ${{ secrets.CF_R2_BUCKET_NAME }}
          CATEGORY: ${{ inputs.category }}
        run: |
          python << 'EOF'
          import pandas as pd
          import glob, os, boto3
          from datetime import datetime

          category = os.environ["CATEGORY"]                        # cars_for_sale | cars_for_rent
          r2_base  = f"showrooms/showrooms_{category}"             # e.g. showrooms/showrooms_cars_for_sale

          excel_files  = glob.glob("showroom_parts/showroom_*.xlsx")
          failed_files = glob.glob("showroom_parts/*_failed.txt")
          print(f"Found {len(excel_files)} Excel files, {len(failed_files)} failed files")

          dt     = datetime.utcnow()
          bucket = os.environ["CF_R2_BUCKET_NAME"]
          client = boto3.client(
              "s3",
              endpoint_url          = os.environ["CF_R2_ENDPOINT_URL"],
              aws_access_key_id     = os.environ["CF_R2_ACCESS_KEY_ID"],
              aws_secret_access_key = os.environ["CF_R2_SECRET_ACCESS_KEY"],
              region_name           = "auto",
          )

          # ── collect failed product URLs ──────────────────────────────────
          all_failed_urls = []
          for fp in failed_files:
              try:
                  with open(fp, encoding="utf-8") as fh:
                      for line in fh:
                          line = line.strip()
                          if line.startswith("http"):
                              all_failed_urls.append(line)
              except Exception as e:
                  print(f"Error reading {fp}: {e}")

          # ── merge Excel files ────────────────────────────────────────────
          success_sheets   = []
          empty_showrooms  = []
          failed_showrooms = []

          with pd.ExcelWriter("all_showrooms.xlsx", engine="openpyxl") as writer:
              for f in excel_files:
                  try:
                      base_name  = os.path.basename(f)
                      sheet_name = base_name.replace("showroom_", "").replace(".xlsx", "")[:31]
                      df         = pd.read_excel(f, sheet_name=0)

                      # detect empty marker written by showroom_main.py
                      is_empty_marker = (
                          len(df) == 1
                          and "status" in df.columns
                          and str(df["status"].iloc[0]) == "empty - no products found"
                      )

                      if df.empty or is_empty_marker:
                          empty_showrooms.append(sheet_name)
                          print(f"  ⚠ EMPTY: {sheet_name}")
                          continue

                      # deduplicate sheet names
                      original = sheet_name
                      counter  = 1
                      while sheet_name in writer.sheets:
                          sheet_name = f"{original}_{counter}"
                          counter   += 1

                      df.to_excel(writer, sheet_name=sheet_name, index=False)
                      success_sheets.append({"name": sheet_name, "rows": len(df)})
                      print(f"  ✓ {sheet_name}: {len(df)} rows")

                  except Exception as e:
                      sheet_name = os.path.basename(f).replace("showroom_", "").replace(".xlsx", "")[:31]
                      failed_showrooms.append(sheet_name)
                      print(f"  ✗ FAILED: {sheet_name} — {e}")

          print(f"\n{'='*40}")
          print(f"[{category}] Success:      {len(success_sheets)}")
          print(f"[{category}] Empty:        {len(empty_showrooms)}")
          print(f"[{category}] Failed read:  {len(failed_showrooms)}")
          print(f"[{category}] Failed URLs:  {len(all_failed_urls)}")

          # ── upload merged Excel ──────────────────────────────────────────
          client.upload_file(
              "all_showrooms.xlsx", bucket,
              f"{r2_base}/excel/all_showrooms.xlsx",
              ExtraArgs={"ContentType": "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"},
          )
          print(f"✅ Uploaded: {r2_base}/excel/all_showrooms.xlsx")

          # ── summary ──────────────────────────────────────────────────────
          with open("scrape_summary.txt", "w", encoding="utf-8") as f:
              f.write(f"=== showrooms_{category} ===\n")
              f.write(f"Run Date: {dt.strftime('%Y-%m-%d %H:%M:%S')} UTC\n")
              f.write(f"Status: DONE\n\n")
              f.write(f"Excel Files Found:   {len(excel_files)}\n")
              f.write(f"Success:             {len(success_sheets)}\n")
              f.write(f"Empty:               {len(empty_showrooms)}\n")
              f.write(f"Failed to Read:      {len(failed_showrooms)}\n")
              f.write(f"Failed Product URLs: {len(all_failed_urls)}\n\n")

              f.write("--- Success ---\n")
              for s in success_sheets:
                  f.write(f"  {s['name']}: {s['rows']} products\n")

              if empty_showrooms:
                  f.write("\n--- Empty Showrooms (no products) ---\n")
                  for s in empty_showrooms:
                      f.write(f"  {s}\n")

              if failed_showrooms:
                  f.write("\n--- Failed to Read ---\n")
                  for s in failed_showrooms:
                      f.write(f"  {s}\n")

          client.upload_file(
              "scrape_summary.txt", bucket,
              f"{r2_base}/summary/scrape_summary.txt",
              ExtraArgs={"ContentType": "text/plain; charset=utf-8"},
          )
          print(f"✅ Uploaded: {r2_base}/summary/scrape_summary.txt")

          # ── failed URLs ──────────────────────────────────────────────────
          with open("failed_urls.txt", "w", encoding="utf-8") as f:
              f.write(f"Total Failed URLs: {len(all_failed_urls)}\n\n")
              for u in all_failed_urls:
                  f.write(u + "\n")

          client.upload_file(
              "failed_urls.txt", bucket,
              f"{r2_base}/summary/failed_urls.txt",
              ExtraArgs={"ContentType": "text/plain; charset=utf-8"},
          )
          print(f"✅ Uploaded: {r2_base}/summary/failed_urls.txt")

          print("\nDone! ✅")
          EOF